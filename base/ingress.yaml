apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    cert-manager.io/cluster-issuer: letsencrypt-issuer
    cert-manager.io/common-name: keycloak.denic0la.ch
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - keycloak.denic0la.ch
      secretName: keycloak-tls
  rules:
    - host: keycloak.denic0la.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  name: http